name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp-server:
    name: MCP server (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  backend:
    name: App backend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notflux-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        # --no-git scans the working tree (current files), so CI blocks NEW
        # secrets without failing permanently on the secret already in history
        # (commit 67ed125) — that one must be handled by rotation + history purge.
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --redact --verbose --exit-code 1
