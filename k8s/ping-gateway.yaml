# ---------------------------------------------------------------------------
# PingGateway — Secret, ConfigMap, Deployment, Service, Ingress
# Namespace: ping-devops-cprice
#
# Before applying: create ping-gateway-secrets OUT OF BAND. Do NOT commit real
# credentials to this file — the placeholders below are intentionally empty.
#   kubectl create secret generic ping-gateway-secrets \
#     --namespace ping-devops-cprice \
#     --from-literal=PINGONE_TE_CLIENT_ID=<client-id> \
#     --from-literal=PINGONE_TE_CLIENT_SECRET=<client-secret> \
#     --from-literal=OAUTH_INTROSPECT_CLIENT_ID=<client-id> \
#     --from-literal=OAUTH_INTROSPECT_CLIENT_SECRET=<client-secret> \
#     --from-literal=OAUTH_INTROSPECT_URL=https://auth.pingone.com/<env-id>/as/introspect \
#     --from-literal=P1AZ_GATEWAY_SERVICE_URI=<service-uri> \
#     --from-literal=P1AZ_GATEWAY_CREDENTIAL=<credential-jwt> \
#     --from-literal=WEATHER_MCP_API_KEY=<key> \
#     --from-literal=SPICE_MCP_API_KEY=<key> \
#     --dry-run=client -o yaml | kubectl apply -f -
# (or manage it via a SealedSecret / ExternalSecret). The Secret resource below
# is a template only; `kubectl apply` will not overwrite a secret created out of
# band unless its keys are non-empty here.
#
# Token flow:  Agent --(mcp_token)--> PingGateway
#              PingGateway validates (McpProtectionFilter)
#              PingGateway exchanges (TokenExchange.groovy) --> backend mcp_token
#              PingGateway proxies --> https://notflux-mcp.ping-devops.com
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ping-gateway-secrets
  namespace: ping-devops-cprice
type: Opaque
stringData:
  # Populate out of band (see header). Leave empty in source control.
  PINGONE_TE_CLIENT_ID:     ""
  PINGONE_TE_CLIENT_SECRET: ""
  OAUTH_INTROSPECT_CLIENT_ID: ""
  OAUTH_INTROSPECT_CLIENT_SECRET: ""
  OAUTH_INTROSPECT_URL: ""
  # PingOne Authorize Sideband API — Authorization > API gateways > Service URL
  P1AZ_GATEWAY_SERVICE_URI: ""
  # PingOne Authorize Sideband API credential — Authorization > API gateways > select gateway > add credential
  P1AZ_GATEWAY_CREDENTIAL:  ""
  # Shared secret with weather-mcp-server — must match WEATHER_API_KEY in weather-mcp-secrets
  WEATHER_MCP_API_KEY: ""
  # Shared secret with spice-mcp-bridge (Agent-Registry) — must match SPICE_MCP_API_KEY in spice-mcp-bridge secrets
  SPICE_MCP_API_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ping-gateway-config
  namespace: ping-devops-cprice
data:
  admin.json: |
    {
      "mode": "PRODUCTION",
      "streamingEnabled": true
    }

  logback.xml: |
    <configuration>
      <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d %-5level [%thread] %logger - %msg%n</pattern>
        </encoder>
      </appender>
      <root level="DEBUG">
        <appender-ref ref="STDOUT" />
      </root>
    </configuration>

  notflux-mcp-proxy.json: |
    {
      "name": "notflux-mcp-proxy",
      "condition": "${find(request.uri.path, '^/mcp')}",
      "heap": [
        {
          "name": "SecretsStore",
          "type": "SystemAndEnvSecretStore",
          "config": {
            "format": "PLAIN"
          }
        },
        {
          "name": "IntrospectionProviderHandler",
          "type": "Chain",
          "config": {
            "filters": [
              {
                "name": "IntrospectionClientBasicAuth",
                "type": "ClientSecretBasicAuthenticationFilter",
                "config": {
                  "clientId": "${env['OAUTH_INTROSPECT_CLIENT_ID']}",
                  "clientSecretId": "oauth.introspect.client.secret",
                  "secretsProvider": "SecretsStore"
                }
              }
            ],
            "handler": {
              "type": "ClientHandler"
            }
          }
        },
        {
          "name": "RsFilterTokenResolver",
          "type": "TokenIntrospectionAccessTokenResolver",
          "config": {
            "endpoint": "${env['OAUTH_INTROSPECT_URL']}",
            "providerHandler": "IntrospectionProviderHandler"
          }
        },
        {
          "name": "rsFilter",
          "type": "OAuth2ResourceServerFilter",
          "config": {
            "requireHttps": false,
            "scopes": [ "&{agentFacingScope}" ],
            "accessTokenResolver": "RsFilterTokenResolver"
          }
        },
        {
          "name": "TokenExchangeEndpointHandler",
          "type": "Chain",
          "config": {
            "filters": [
              {
                "name": "TokenExchangeClientBasicAuth",
                "type": "ClientSecretBasicAuthenticationFilter",
                "config": {
                  "clientId": "${env['PINGONE_TE_CLIENT_ID']}",
                  "clientSecretId": "pingone.te.client.secret",
                  "secretsProvider": "SecretsStore"
                }
              }
            ],
            "handler": {
              "type": "ClientHandler"
            }
          }
        },
        {
          "name": "TokenExchangeFailureHandler",
          "type": "StaticResponseHandler",
          "config": {
            "status": 401,
            "headers": {
              "Content-Type": [ "application/json" ]
            },
            "entity": "{\"error\":\"${contexts.oauth2Failure.error}\",\"error_description\":\"${contexts.oauth2Failure.description}\"}"
          }        },
        {
          "name": "P1AZDenyHandler",
          "type": "StaticResponseHandler",
          "config": {
            "status": 403,
            "headers": {
              "Content-Type": [ "application/json" ]
            },
            "entity": "{\"error\":\"access_denied\",\"error_description\":\"Request denied by policy\"}"
          }        }
      ],
      "properties": {
        "gatewayUrl": "https://notflux-gateway.ping-devops.com",
        "authorizationServerUri": "https://auth.pingone.com/59bb6a66-e76e-490c-b83a-884c50423da4/as",
        "mcpServerUrl": "http://notflux-mcp-server",
        "mcpServerAudience": "notflux-mcp",
        "agentFacingScope": "use_gateway",
        "mcpServerScope": "use_mcp_tools"
      },
      "baseURI": "&{mcpServerUrl}",
      "handler": {
        "type": "Chain",
        "capture": "all",
        "config": {
          "filters": [
            {
              "type": "UriPathRewriteFilter",
              "config": {
                "mappings": {
                  "/mcp": "/mcp"
                }
              }
            },
            {
              "type": "McpProtectionFilter",
              "config": {
                "resourceId": "&{gatewayUrl}/mcp",
                "authorizationServerUri": "&{authorizationServerUri}",
                "resourceServerFilter": "rsFilter",
                "resourceIdPointer": "/aud",
                "supportedScopes": [ "&{agentFacingScope}" ]
              }
            },
            {
              "type": "McpValidationFilter",
              "config": {
                "acceptedOrigins": ".*"
              }
            },
            {
              "name": "P1AZPolicyDecision",
              "type": "PingAuthorizeFilter",
              "config": {
                "gatewayServiceUri": "&{P1AZ_GATEWAY_SERVICE_URI}",
                "secretsProvider": "SecretsStore",
                "gatewayCredentialSecretId": "p1az.gateway.credential"
              }
            },
            {
              "name": "GatewayToMcpTokenExchange",
              "type": "OAuth2TokenExchangeFilter",
              "config": {
                "endpoint": "&{authorizationServerUri}/token",
                "endpointHandler": "TokenExchangeEndpointHandler",
                "failureHandler": "TokenExchangeFailureHandler",
                "subjectToken": "#{request.headers['Authorization'][0].substring(7)}",
                "subjectTokenType": "urn:ietf:params:oauth:token-type:access_token",
                "requestedTokenType": "urn:ietf:params:oauth:token-type:access_token",
                "scopes": [ "&{mcpServerScope}" ],
                "audience": "&{mcpServerAudience}"
              }
            },
            {
              "type": "HeaderFilter",
              "config": {
                "messageType": "request",
                "remove": [ "Authorization" ],
                "add": {
                  "Authorization": [ "Bearer ${contexts.oauth2TokenExchange.issuedToken}" ]
                }
              }
            }
          ],
          "handler": {
            "type": "ReverseProxyHandler",
            "config": {
              "soTimeout": "30 seconds"
            }
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
  labels:
    app: ping-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-gateway
  template:
    metadata:
      labels:
        app: ping-gateway
    spec:
      containers:
        - name: ping-gateway
          image: docker.io/pricecs/ping-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PINGONE_TE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: PINGONE_TE_CLIENT_ID
            - name: PINGONE_TE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: PINGONE_TE_CLIENT_SECRET
            - name: OAUTH_INTROSPECT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: OAUTH_INTROSPECT_CLIENT_ID
            - name: OAUTH_INTROSPECT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: OAUTH_INTROSPECT_CLIENT_SECRET
            - name: OAUTH_INTROSPECT_URL
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: OAUTH_INTROSPECT_URL
            - name: P1AZ_GATEWAY_SERVICE_URI
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: P1AZ_GATEWAY_SERVICE_URI
            - name: P1AZ_GATEWAY_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: P1AZ_GATEWAY_CREDENTIAL
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: gateway-instance
              mountPath: /var/gateway
            - name: gateway-config
              mountPath: /var/gateway/config/admin.json
              subPath: admin.json
            - name: gateway-config
              mountPath: /var/gateway/config/routes/notflux-mcp-proxy.json
              subPath: notflux-mcp-proxy.json
      volumes:
        - name: gateway-instance
          emptyDir: {}
        - name: gateway-config
          configMap:
            name: ping-gateway-config

---
apiVersion: v1
kind: Service
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
spec:
  selector:
    app: ping-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-ping-cloud
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx-public
  tls:
    - hosts:
        - notflux-gateway.ping-devops.com
      secretName: ping-gateway-tls
  rules:
    - host: notflux-gateway.ping-devops.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ping-gateway
                port:
                  number: 80
