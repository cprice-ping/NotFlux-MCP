# ---------------------------------------------------------------------------
# PingGateway — Secret, ConfigMap, Deployment, Service, Ingress
# Namespace: ping-devops-cprice
#
# Before applying: populate ping-gateway-secrets with your TE client credentials.
#   kubectl create secret generic ping-gateway-secrets \
#     --namespace ping-devops-cprice \
#     --from-literal=PINGONE_TE_CLIENT_ID=<client-id> \
#     --from-literal=PINGONE_TE_CLIENT_SECRET=<client-secret>
#
# Token flow:  Agent --(mcp_token)--> PingGateway
#              PingGateway validates (McpProtectionFilter)
#              PingGateway exchanges (TokenExchange.groovy) --> backend mcp_token
#              PingGateway proxies --> https://notflux-mcp.ping-devops.com
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ping-gateway-secrets
  namespace: ping-devops-cprice
type: Opaque
stringData:
  PINGONE_TE_CLIENT_ID:     "97596196-52b4-4237-8853-651cb5594cf6"   # fill before applying
  PINGONE_TE_CLIENT_SECRET: "~xv3rTpLCFe~.5tVXZVhIqJGVcWS2aEDn5fXKhqvDE5d3OXcZRWtA.3J~24abqT_"   # fill before applying
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ping-gateway-config
  namespace: ping-devops-cprice
data:
  admin.json: |
    {
      "mode": "PRODUCTION",
      "streamingEnabled": true
    }

  notflux-mcp-proxy.json: |
    {
      "name": "notflux-mcp-proxy",
      "condition": "${find(request.uri.path, '^/mcp')}",
      "heap": [
        {
          "name": "rsFilter",
          "type": "OAuth2ResourceServerFilter",
          "config": {
            "requireHttps": false,
            "scopes": [ "use_gateway" ],
            "accessTokenResolver": {
              "type": "StatelessAccessTokenResolver",
              "config": {
                "issuer": "https://auth.pingone.com/59bb6a66-e76e-490c-b83a-884c50423da4/as",
                "verificationSecretId": "verify.gateway.token",
                "secretsProvider": {
                  "type": "SecretsProvider",
                  "config": {
                    "stores": [
                      {
                        "type": "JwkSetSecretStore",
                        "config": {
                          "jwkUrl": "https://auth.pingone.com/59bb6a66-e76e-490c-b83a-884c50423da4/as/jwks"
                        }
                      }
                    ]
                  }
                }
              }
            }
          }
        }
      ],
      "properties": {
        "gatewayUrl":             "https://notflux-gateway.ping-devops.com",
        "authorizationServerUri": "https://auth.pingone.com/59bb6a66-e76e-490c-b83a-884c50423da4/as",
        "mcpServerUrl":           "https://notflux-mcp.ping-devops.com",
        "mcpServerAudience":      "https://notflux-mcp.ping-devops.com",
        "agentFacingScope":       "use_gateway",
        "mcpServerScope":         "use_mcp_tools"
      },
      "baseURI": "&{mcpServerUrl}",
      "handler": {
        "type": "Chain",
        "config": {
          "filters": [
            {
              "type": "UriPathRewriteFilter",
              "config": { "mappings": { "/mcp": "/mcp" } }
            },
            {
              "type": "McpProtectionFilter",
              "config": {
                "resourceId": "&{gatewayUrl}/mcp",
                "authorizationServerUri": "&{authorizationServerUri}",
                "resourceServerFilter": "rsFilter",
                "supportedScopes": [ "&{agentFacingScope}" ],
                "resourceIdPointer": "/aud"
              }
            },
            {
              "type": "McpValidationFilter",
              "config": { "acceptedOrigins": ".*" }
            },
            {
              "type": "ScriptableFilter",
              "config": {
                "type": "application/x-groovy",
                "file": "TokenExchange.groovy",
                "args": {
                  "tokenEndpoint":  "&{authorizationServerUri}/token",
                  "clientId":       "${env['PINGONE_TE_CLIENT_ID']}",
                  "clientSecret":   "${env['PINGONE_TE_CLIENT_SECRET']}",
                  "requestedScope": "&{mcpServerScope}"
                }
              }
            }
          ],
          "handler": {
            "type": "ReverseProxyHandler",
            "config": { "soTimeout": "30 seconds" }
          }
        }
      }
    }

  TokenExchange.groovy: |
    import org.forgerock.http.protocol.*

    def clientId       = args.clientId       as String
    def clientSecret   = args.clientSecret   as String
    def tokenEndpoint  = args.tokenEndpoint  as String
    def requestedScope = args.requestedScope as String

    if (!clientId || !clientSecret) {
        logger.warn('TokenExchange: credentials not set — returning 401')
        return new Response(Status.UNAUTHORIZED)
    }

    def incomingAuth = request.headers['Authorization']?.firstValue
    if (!incomingAuth?.startsWith('Bearer ')) {
        logger.warn('TokenExchange: no Bearer token — returning 401')
        return new Response(Status.UNAUTHORIZED)
    }
    def subjectToken = incomingAuth.substring(7)

    def credentials = "${clientId}:${clientSecret}".bytes.encodeBase64().toString()

    def teRequest = new Request()
    teRequest.method = 'POST'
    teRequest.uri = new URI(tokenEndpoint)
    teRequest.headers.put('Authorization', "Basic ${credentials}")
    teRequest.headers.put('Content-Type', 'application/x-www-form-urlencoded')
    teRequest.entity.setString(
        "grant_type=${URLEncoder.encode('urn:ietf:params:oauth:grant-type:token-exchange', 'UTF-8')}" +
        "&subject_token=${URLEncoder.encode(subjectToken, 'UTF-8')}" +
        "&subject_token_type=${URLEncoder.encode('urn:ietf:params:oauth:token-type:access_token', 'UTF-8')}" +
        "&requested_token_type=${URLEncoder.encode('urn:ietf:params:oauth:token-type:access_token', 'UTF-8')}" +
        "&scope=${URLEncoder.encode(requestedScope, 'UTF-8')}"
    )

    logger.debug("TokenExchange: POST ${tokenEndpoint} scope=${requestedScope}")
    def teResponse = http.send(teRequest).get()
    if (teResponse.status.code != 200) {
        logger.error("TokenExchange: PingOne returned ${teResponse.status.code}")
        return new Response(Status.UNAUTHORIZED)
    }

    def json = teResponse.entity.json
    request.headers.put('Authorization', "Bearer ${json['access_token']}")
    logger.debug('TokenExchange: ok — Authorization replaced')
    return next.handle(context, request)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
  labels:
    app: ping-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-gateway
  template:
    metadata:
      labels:
        app: ping-gateway
    spec:
      containers:
        - name: ping-gateway
          image: docker.io/pricecs/ping-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PINGONE_TE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: PINGONE_TE_CLIENT_ID
            - name: PINGONE_TE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ping-gateway-secrets
                  key: PINGONE_TE_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 11111
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: gateway-instance
              mountPath: /var/gateway
            - name: gateway-config
              mountPath: /var/gateway/config/admin.json
              subPath: admin.json
            - name: gateway-config
              mountPath: /var/gateway/config/routes/notflux-mcp-proxy.json
              subPath: notflux-mcp-proxy.json
            - name: gateway-config
              mountPath: /var/gateway/scripts/groovy/TokenExchange.groovy
              subPath: TokenExchange.groovy
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: gateway-instance
          emptyDir: {}
        - name: gateway-config
          configMap:
            name: ping-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
spec:
  selector:
    app: ping-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ping-gateway
  namespace: ping-devops-cprice
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-ping-cloud
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx-public
  tls:
    - hosts:
        - notflux-gateway.ping-devops.com
      secretName: ping-gateway-tls
  rules:
    - host: notflux-gateway.ping-devops.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ping-gateway
                port:
                  number: 80
