apiVersion: apps/v1
kind: Deployment
metadata:
  name: notflux-mcp-server
  namespace: default
  labels:
    app: notflux-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notflux-mcp-server
  template:
    metadata:
      labels:
        app: notflux-mcp-server
    spec:
      containers:
        - name: notflux-mcp-server
          image: docker.io/pricecs/notflux-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: notflux-mcp-server
  namespace: default
  labels:
    app: notflux-mcp-server
spec:
  type: NodePort
  selector:
    app: notflux-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
